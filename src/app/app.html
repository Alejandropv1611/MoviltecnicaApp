<div class="app-layout" *ngIf="authService.isLoggedIn()">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div style="display: flex; align-items: center; gap: 12px;">
        <div class="logo-icon">
          <svg viewBox="0 0 200 200" width="36" height="36" xmlns="http://www.w3.org/2000/svg">
            <g stroke-width="24" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M 100,100 L 40,40 C 20,20 20,180 40,160 L 100,100" stroke="#8BC34A" />
              <path d="M 100,100 L 160,40 C 180,20 180,180 160,160 L 100,100" stroke="#F57C00" />
            </g>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-brand">Movitécnica</span>
          <span class="logo-sub">Gestión Operativa</span>
        </div>
      </div>
      <button class="mobile-logout" (click)="authService.logout()" title="Salir">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      </button>
    </div>
    
    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a routerLink="/servicios" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Servicios</span>
      </a>
      <a routerLink="/kpis" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📈</span>
        <span class="nav-label">KPIs</span>
      </a>
      <a routerLink="/recursos" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📦</span>
        <span class="nav-label">Recursos</span>
      </a>
      <a routerLink="/tecnicos" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">👷</span>
        <span class="nav-label">Técnicos</span>
      </a>
      <a routerLink="/clientes" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">🏢</span>
        <span class="nav-label">Clientes</span>
      </a>
      <a routerLink="/planificador" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📅</span>
        <span class="nav-label">Planificador</span>
      </a>
    </nav>

    <div class="sidebar-footer" style="display: flex; justify-content: space-between; align-items: center;">
      <div class="version">v4.0.0 &bull; Angular</div>
      <button class="m-btn m-btn-sm" style="padding: 4px 8px; font-size: 11px; background: transparent; border: 1px solid var(--border); color: var(--txt-m);" (click)="authService.logout()">Salir</button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content">
    <div class="content-container">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>

<app-login *ngIf="!authService.isLoggedIn()"></app-login>
